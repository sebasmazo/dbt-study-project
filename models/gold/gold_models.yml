version: 2

models:
  - name: fct_finance_payments
    description: Fact table with one record per payment, user, date and status, including amount.
    columns:
      - name: payment_id
        description: Primary key. One row per payment.
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error
          - relationships:
              field: payment_id
              to: ref('stg_payments')
      - name: order_id
        description: Foreign key to stg_orders.order_id. Not unique — orders can have multiple payments.
        tests:
          - not_null:
              severity: error
          - relationships:
              field: order_id
              to: ref('stg_orders')
      - name: customer_id
        description: Foreign key to stg_customers.customer_id.
        tests:
          - not_null:
              severity: error
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: Date when the order was placed.
        tests:
          - not_null:
              severity: error
      - name: order_status
        description: Current status of the order (e.g., 'completed', 'pending').
        tests:
          - not_null:
              severity: error
      - name: payment_method
        description: Method used for the payment (e.g., 'credit_card', 'paypal').
        tests:
          - not_null:
              severity: error
      - name: amount
        description: Amount of the payment.
        tests:
          - not_null:
              severity: error
  - name: dim_customers
    description: Dimension table with one record per customer, including first and last name and analytical information.
    columns:
      - name: customer_id
        description: Primary key. Unique identifier for each customer.
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: first_name
        description: First name of the customer.
        tests:
          - not_null:
              severity: error
      - name: last_name
        description: Last name of the customer.
        tests:
          - not_null:
              severity: error
      - name: first_order_date
        description: Date when the customer placed their first order.
        tests:
          - not_null:
              severity: error
      - name: last_order_date
        description: Date when the customer placed their most recent order.
        tests:
          - not_null:
              severity: error
      - name: total_orders
        description: Total number of orders placed by the customer.
        tests:
          - not_null:
              severity: error
      - name: avg_ticket
        description: Average amount spent per order by the customer.
        tests:
          - not_null:
              severity: error